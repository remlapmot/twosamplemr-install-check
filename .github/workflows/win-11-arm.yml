on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '31 6 * * TUE' # run on Tuesdays at 6:31 UTC

name: Check-install-win-11-arm

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: windows-11-arm

    name: windows-11-arm

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      R_VERSION: "4.6.1"
      RTOOLS_BUILD: "rtools45-aarch64-6768-6492"

    steps:
      - name: Install R aarch64
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/remlapmot/r-build-for-windows-on-gha/releases/download/R-$env:R_VERSION/R-$env:R_VERSION-aarch64-openblas.exe"
          curl.exe -L -o R-aarch64.exe "$url"
          Start-Process -FilePath R-aarch64.exe -ArgumentList "/install /norestart /verysilent /SUPPRESSMSGBOXES" -NoNewWindow -Wait
          "C:\Program Files\R-aarch64\R-$env:R_VERSION\bin" >> $env:GITHUB_PATH

      - name: Install Rtools45
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/r-hub/rtools45/releases/download/latest/rtools45-aarch64.exe"
          curl.exe -L -o rtools45-aarch64.exe "$url"
          Start-Process -FilePath rtools45-aarch64.exe -ArgumentList "/install /norestart /verysilent /SUPPRESSMSGBOXES" -NoNewWindow -Wait
          "C:\rtools45-aarch64\usr\bin" >> $env:GITHUB_PATH

      - name: Install pandoc
        run: choco install pandoc --no-progress

      - name: Install TwoSampleMR and report session info
        run: |
          $ErrorActionPreference = 'Stop'
          Rscript -e "print(R.version); install.packages('TwoSampleMR', dependencies = TRUE, repos = c('https://cloud.r-project.org/', 'https://mrcieu.r-universe.dev')); library(TwoSampleMR); install.packages('sessioninfo', repos = 'https://cloud.r-project.org/'); sessioninfo::session_info(pkgs = 'installed')"

      - name: Install TinyTeX
        run: |
          $ErrorActionPreference = 'Stop'
          Rscript -e "install.packages(c('tinytex'), repos = 'https://cloud.r-project.org/'); tinytex::install_tinytex(); tinytex::tlmgr(c('option', 'repository', 'https://mirror.ctan.org/systems/texlive/tlnet')); tinytex::tlmgr_install(c('makeindex', 'upquote', 'inconsolata', 'ae', 'parskip', 'hyperref', 'times', 'cm-super', 'tex-gyre'))"
          "C:\Users\runneradmin\AppData\Roaming\TinyTeX\bin\windows" >> $env:GITHUB_PATH

      - name: Install V8 from source
        run: |
          $ErrorActionPreference = 'Stop'
          Rscript -e "tryCatch(install.packages('V8', repos = 'https://cloud.r-project.org/', type = 'source'), error = function(e) message('V8 installation failed: ', e$message))"

      - name: Clone TwoSampleMR and remove installed version
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 https://github.com/MRCIEU/TwoSampleMR.git
          Rscript -e "remove.packages('TwoSampleMR')"

      - name: Check makeindex
        run: |
          $makeindex = Get-Command makeindex -ErrorAction SilentlyContinue
          if ($makeindex) {
            Write-Host "makeindex found at: $($makeindex.Source)"
          } else {
            Write-Host "makeindex NOT found in PATH"
          }

      - name: R CMD check
        env:
          R_MAKEINDEX: C:\Users\runneradmin\AppData\Roaming\TinyTeX\bin\windows\makeindex.exe
        run: |
          $ErrorActionPreference = 'Stop'
          Rcmd build TwoSampleMR
          $tarball = Get-ChildItem -Filter "TwoSampleMR_*.tar.gz" | Select-Object -First 1 -ExpandProperty Name
          Rcmd check --as-cran $tarball

      - name: Show check and LaTeX logs
        if: always()
        run: |
          Get-Content TwoSampleMR.Rcheck\00check.log -ErrorAction SilentlyContinue
          Get-Content TwoSampleMR.Rcheck\TwoSampleMR-manual.log -ErrorAction SilentlyContinue
